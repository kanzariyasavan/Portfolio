  <script>
    // ─── Reveal on scroll ─────────────────────
    const revs = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
      });
    }, { threshold: 0.1 });
    revs.forEach(r => io.observe(r));

    // ─── Skill bars ───────────────────────────
    const allBars = document.querySelectorAll('[data-w]');
    const barIO = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.style.width = e.target.dataset.w;
          barIO.unobserve(e.target);
        }
      });
    }, { threshold: 0.3 });
    allBars.forEach(b => barIO.observe(b));

    // ─── Active nav ───────────────────────────
    const secs = document.querySelectorAll('section[id]');
    const links = document.querySelectorAll('.nav-center a');
    window.addEventListener('scroll', () => {
      let cur = '';
      secs.forEach(s => { if (window.scrollY >= s.offsetTop - 80) cur = s.id; });
      links.forEach(a => {
        a.style.color = a.getAttribute('href') === '#' + cur ? 'var(--ink)' : '';
      });
    });

    // ─── Form submit ──────────────────────────
    function handleSubmit(btn) {
      const orig = btn.textContent;
      btn.textContent = '✓ Sent Successfully';
      btn.style.background = '#2d6a4f';
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = orig;
        btn.style.background = '';
        btn.disabled = false;
      }, 3500);
    }
  </script>
